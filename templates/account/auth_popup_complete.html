{% extends "base.html" %}
{% load static %}

{% block title %}Completing Sign In{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-10">
  <div class="w-full max-w-lg rounded-xl border border-slate-200 bg-white p-8 shadow-lg">
    <h1 class="text-xl font-semibold text-slate-900">Completing sign in</h1>
    <p id="auth-popup-complete-status" class="mt-3 text-sm text-slate-600">Finishing authentication...</p>
    <pre id="auth-popup-complete-error" class="mt-4 hidden rounded-lg border border-red-200 bg-red-50 px-4 py-3 text-xs text-red-700 whitespace-pre-wrap"></pre>
  </div>
</div>
{% endblock %}

{% block extra_js %}
  {{ block.super }}
  <script type="module" src="{% static 'js/account_auth_popup_complete.js' %}"></script>
{% endblock %}
