        detail:
          type: string
      required:
        - detail
    WhitelistPolicyEnum:
      enum:
        - default
        - manual
      type: string
      description: |-
        * `default` - Default (Owner or Org Members)
        * `manual` - Allowed Contacts List
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: Token-based authentication with required prefix "Token"
servers:
  - url: https://gobii.ai/api/v1
    description: Production server
tags:
  - name: Agents API
