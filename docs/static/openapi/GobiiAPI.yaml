          type: string
          maxLength: 64
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        listing_description:
          type: string
          description: Human-readable description of what the agent does.
          readOnly: true
        mini_description:
          type: string
          description: Human-readable brief description of what the agent does.
          readOnly: true
      required:
        - name
    AgentList:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          maxLength: 64
        created_at:
          type: string
          format: date-time
          readOnly: true
        listing_description:
          type: string
          description: Human-readable description of what the agent does.
          readOnly: true
        mini_description:
          type: string
          description: Human-readable brief description of what the agent does.
          readOnly: true
      required:
        - name
    CancelTaskConflictResponse:
      type: object
      properties:
        detail:
          type: string
          description: Error message indicating that the task is not in a cancellable state.
      required:
        - detail
    CancelTaskResponse:
      type: object
      properties:
        status:
          type: string
          description: Status of the task after cancellation.
        message:
          type: string
          description: Message indicating the result of the cancellation.
      required:
        - message
        - status
    InsufficientCreditsResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    LifeStateEnum:
      enum:
        - active
        - expired
      type: string
      description: |-
        * `active` - Active
        * `expired` - Expired
    PaginatedAgentListList:
      type: object
      required:
        - count
        - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: "#/components/schemas/AgentList"
    PaginatedPersistentAgentListList:
      type: object
      required:
        - count
        - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
