          type: string
          description: Human-readable description of what the agent does.
          readOnly: true
        mini_description:
          type: string
          description: Human-readable brief description of what the agent does.
          readOnly: true
    PatchedPersistentAgentDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: ID of the persistent agent.
        name:
          type: string
          description: Human-readable name for this agent.
          maxLength: 255
        charter:
          type: string
          description: The assigned objectives of the agent.
        short_description:
          type: string
          readOnly: true
          description: Generated short summary of the agent charter for listings.
        schedule:
          type: string
          nullable: true
          description: Cron-like schedule expression or interval (e.g., '@daily', '@every 30m').
          maxLength: 128
        schedule_snapshot:
          type: string
          nullable: true
          description: Snapshot of cron schedule for restoration.
          maxLength: 128
        is_active:
          type: boolean
          description: Whether this agent is currently active
        life_state:
          allOf:
            - $ref: "#/components/schemas/LifeStateEnum"
          description: |-
            Lifecycle state for soft-expiration. 'paused' is represented by is_active=False.

            * `active` - Active
            * `expired` - Expired
        whitelist_policy:
          allOf:
            - $ref: "#/components/schemas/WhitelistPolicyEnum"
          description: |-
            Controls who can message this agent and who the agent may contact. Manual: only addresses/numbers listed on the agent's allowlist (includes owner/org members by default).

            * `default` - Default (Owner or Org Members)
            * `manual` - Allowed Contacts List
        last_interaction_at:
          type: string
