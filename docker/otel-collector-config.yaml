receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  nop:
    # Keep the collector available for app OTLP exports after Grafana Cloud
    # was canceled, but avoid noisy permanent export failures.

extensions:
  zpages:
    endpoint: "0.0.0.0:55679"

service:
  extensions:
    [
      zpages
    ]
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [nop]
    logs:
      receivers: [otlp]
      exporters: [nop]
