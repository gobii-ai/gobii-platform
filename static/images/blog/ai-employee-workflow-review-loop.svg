<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">A supervised AI employee workflow from inputs to handoff</title>
  <desc id="desc">A four-stage loop showing approved inputs, AI teammate execution, human review, and a structured handoff, surrounded by permissions and escalation rules.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#312e81" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="1200" height="630" rx="32" fill="url(#background)"/>
  <text x="70" y="82" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="700">How a supervised AI employee owns a workflow</text>
  <text x="70" y="122" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="20">Define the work, constrain the actions, review judgment calls, and improve the next run.</text>

  <g filter="url(#shadow)">
    <rect x="65" y="182" width="235" height="225" rx="22" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
    <rect x="335" y="182" width="235" height="225" rx="22" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
    <rect x="605" y="182" width="235" height="225" rx="22" fill="#ffffff" stroke="#a7f3d0" stroke-width="2"/>
    <rect x="875" y="182" width="260" height="225" rx="22" fill="#ffffff" stroke="#c7d2fe" stroke-width="2"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <circle cx="105" cy="224" r="22" fill="#e0e7ff"/>
    <text x="105" y="232" text-anchor="middle" fill="#4338ca" font-size="22" font-weight="700">1</text>
    <text x="92" y="280" fill="#0f172a" font-size="24" font-weight="700">Approved inputs</text>
    <text x="92" y="320" fill="#475569" font-size="18">
      <tspan x="92" dy="0">Records, files, rules,</tspan>
      <tspan x="92" dy="29">examples, and trusted</tspan>
      <tspan x="92" dy="29">source boundaries</tspan>
    </text>

    <circle cx="375" cy="224" r="22" fill="#ede9fe"/>
    <text x="375" y="232" text-anchor="middle" fill="#6d28d9" font-size="22" font-weight="700">2</text>
    <text x="362" y="280" fill="#0f172a" font-size="24" font-weight="700">AI teammate</text>
    <text x="362" y="320" fill="#475569" font-size="18">
      <tspan x="362" dy="0">Researches, compares,</tspan>
      <tspan x="362" dy="29">drafts, structures, and</tspan>
      <tspan x="362" dy="29">records uncertainty</tspan>
    </text>

    <circle cx="645" cy="224" r="22" fill="#d1fae5"/>
    <text x="645" y="232" text-anchor="middle" fill="#047857" font-size="22" font-weight="700">3</text>
    <text x="632" y="280" fill="#0f172a" font-size="24" font-weight="700">Human review</text>
    <text x="632" y="320" fill="#475569" font-size="18">
      <tspan x="632" dy="0">Approves, rejects, or</tspan>
      <tspan x="632" dy="29">redirects judgment calls</tspan>
      <tspan x="632" dy="29">and exceptions</tspan>
    </text>

    <circle cx="915" cy="224" r="22" fill="#e0e7ff"/>
    <text x="915" y="232" text-anchor="middle" fill="#4338ca" font-size="22" font-weight="700">4</text>
    <text x="902" y="280" fill="#0f172a" font-size="24" font-weight="700">Structured handoff</text>
    <text x="902" y="320" fill="#475569" font-size="18">
      <tspan x="902" dy="0">Reviewed output moves</tspan>
      <tspan x="902" dy="29">to the system of record</tspan>
      <tspan x="902" dy="29">with sources intact</tspan>
    </text>
  </g>

  <g fill="none" stroke="#6366f1" stroke-width="4" marker-end="url(#arrow)">
    <path d="M 300 295 C 315 295, 320 295, 335 295"/>
    <path d="M 570 295 C 585 295, 590 295, 605 295"/>
    <path d="M 840 295 C 855 295, 860 295, 875 295"/>
  </g>

  <path d="M 1005 420 C 1005 520, 460 535, 440 430" fill="none" stroke="#7c3aed" stroke-width="4" stroke-dasharray="10 9" marker-end="url(#arrow)"/>
  <text x="690" y="525" text-anchor="middle" fill="#6d28d9" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">Reviewer feedback updates instructions, examples, and boundaries</text>

  <rect x="155" y="552" width="890" height="48" rx="24" fill="url(#accent)"/>
  <text x="600" y="583" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600">Permission limits • action logs • review queues • escalation rules • measurable acceptance criteria</text>
</svg>
