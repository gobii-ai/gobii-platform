<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI agent visual review scorecard with ass factor meter</title>
  <desc id="desc">A playful product-design review board showing screenshots, comments, and an ass factor meter dropping as issues get fixed.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7faf8"/>
      <stop offset="0.5" stop-color="#eef7f4"/>
      <stop offset="1" stop-color="#fff6ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#14213d" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1090" cy="92" r="58" fill="#ffb86b" opacity="0.32"/>
  <circle cx="96" cy="540" r="70" fill="#3bb7a6" opacity="0.22"/>

  <g filter="url(#shadow)">
    <rect x="86" y="82" width="1028" height="466" rx="24" fill="#ffffff"/>
    <rect x="86" y="82" width="1028" height="72" rx="24" fill="#172033"/>
    <rect x="86" y="130" width="1028" height="24" fill="#172033"/>
  </g>

  <circle cx="124" cy="118" r="8" fill="#ff6b6b"/>
  <circle cx="152" cy="118" r="8" fill="#ffd166"/>
  <circle cx="180" cy="118" r="8" fill="#3bb7a6"/>
  <text x="222" y="126" font-family="Inter, Arial, sans-serif" font-size="22" fill="#f8fafc" font-weight="700">Design review agent</text>
  <text x="868" y="126" font-family="Inter, Arial, sans-serif" font-size="18" fill="#cbd5e1">Visual QA session</text>

  <g>
    <rect x="126" y="194" width="292" height="236" rx="18" fill="#f8fafc" stroke="#d8e2ea"/>
    <rect x="152" y="224" width="240" height="144" rx="12" fill="#e8eef5"/>
    <rect x="176" y="246" width="148" height="18" rx="9" fill="#94a3b8"/>
    <rect x="176" y="280" width="190" height="12" rx="6" fill="#cbd5e1"/>
    <rect x="176" y="306" width="102" height="34" rx="17" fill="#ff8a65"/>
    <text x="152" y="398" font-family="Inter, Arial, sans-serif" font-size="18" fill="#172033" font-weight="700">Before</text>
    <text x="224" y="398" font-family="Inter, Arial, sans-serif" font-size="18" fill="#64748b">ass factor: 8.4</text>
  </g>

  <g>
    <rect x="454" y="194" width="292" height="236" rx="18" fill="#f8fafc" stroke="#d8e2ea"/>
    <rect x="480" y="224" width="240" height="144" rx="12" fill="#eaf7f3"/>
    <rect x="504" y="248" width="132" height="18" rx="9" fill="#3bb7a6"/>
    <rect x="504" y="284" width="182" height="12" rx="6" fill="#a7d8ce"/>
    <rect x="504" y="314" width="112" height="34" rx="17" fill="#172033"/>
    <text x="480" y="398" font-family="Inter, Arial, sans-serif" font-size="18" fill="#172033" font-weight="700">After</text>
    <text x="544" y="398" font-family="Inter, Arial, sans-serif" font-size="18" fill="#64748b">ass factor: 2.1</text>
  </g>

  <g>
    <rect x="784" y="194" width="292" height="236" rx="18" fill="#172033"/>
    <text x="818" y="242" font-family="Inter, Arial, sans-serif" font-size="24" fill="#ffffff" font-weight="800">Agent notes</text>
    <rect x="818" y="272" width="214" height="12" rx="6" fill="#8fd6c8"/>
    <rect x="818" y="302" width="178" height="12" rx="6" fill="#fbbf7a"/>
    <rect x="818" y="332" width="230" height="12" rx="6" fill="#cbd5e1"/>
    <text x="818" y="388" font-family="Inter, Arial, sans-serif" font-size="19" fill="#f8fafc">"Ass factor reduced after</text>
    <text x="818" y="416" font-family="Inter, Arial, sans-serif" font-size="19" fill="#f8fafc">spacing and hierarchy fixes."</text>
  </g>

  <g>
    <path d="M324 478 C454 522 614 522 746 478" fill="none" stroke="#3bb7a6" stroke-width="10" stroke-linecap="round"/>
    <polygon points="746,478 719,467 725,497" fill="#3bb7a6"/>
    <text x="382" y="560" font-family="Inter, Arial, sans-serif" font-size="32" fill="#172033" font-weight="900">When agents learn the team's taste</text>
  </g>
</svg>
