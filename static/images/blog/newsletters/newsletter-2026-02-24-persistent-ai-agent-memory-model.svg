<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc">
  <title id="title">Three layers of persistent AI agent memory</title>
  <desc id="desc">Standing instructions, a unified timeline, and reusable files feed focused working context for a persistent Gobii agent.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10072f"/>
      <stop offset="0.52" stop-color="#2d1261"/>
      <stop offset="1" stop-color="#061d3d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.54"/>
      <stop offset="1" stop-color="#312e81" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="focus" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="500" rx="24" fill="url(#background)"/>
  <text x="600" y="58" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="700" text-anchor="middle">Persistent memory keeps the right context available</text>
  <text x="600" y="88" fill="#c4b5fd" font-family="Inter, Arial, sans-serif" font-size="17" text-anchor="middle">Three durable layers feed one focused working context</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="55" y="140" width="255" height="245" rx="22" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="182" cy="198" r="34" fill="#7c3aed"/>
    <path d="M169 198l9 9 19-22" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="182" y="257" fill="#ffffff" font-size="23" font-weight="700" text-anchor="middle">Standing instructions</text>
    <text x="182" y="292" fill="#ddd6fe" font-size="16" text-anchor="middle">Role and boundaries</text>
    <text x="182" y="321" fill="#ddd6fe" font-size="16" text-anchor="middle">Recurring preferences</text>
    <text x="182" y="350" fill="#ddd6fe" font-size="16" text-anchor="middle">Approval rules</text>

    <rect x="342" y="140" width="255" height="245" rx="22" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="469" cy="198" r="34" fill="#6d28d9"/>
    <path d="M452 190h34M452 200h24M452 210h30" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <text x="469" y="257" fill="#ffffff" font-size="23" font-weight="700" text-anchor="middle">Unified timeline</text>
    <text x="469" y="292" fill="#ddd6fe" font-size="16" text-anchor="middle">Messages and decisions</text>
    <text x="469" y="321" fill="#ddd6fe" font-size="16" text-anchor="middle">Plans and tool activity</text>
    <text x="469" y="350" fill="#ddd6fe" font-size="16" text-anchor="middle">Requests and results</text>

    <rect x="629" y="140" width="255" height="245" rx="22" fill="url(#card)" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="756" cy="198" r="34" fill="#5b21b6"/>
    <path d="M738 188h14l7 8h17v19h-38z" fill="none" stroke="#ffffff" stroke-width="5" stroke-linejoin="round"/>
    <text x="756" y="257" fill="#ffffff" font-size="23" font-weight="700" text-anchor="middle">Reusable files</text>
    <text x="756" y="292" fill="#ddd6fe" font-size="16" text-anchor="middle">Briefs and policies</text>
    <text x="756" y="321" fill="#ddd6fe" font-size="16" text-anchor="middle">Datasets and references</text>
    <text x="756" y="350" fill="#ddd6fe" font-size="16" text-anchor="middle">Saved deliverables</text>

    <path d="M310 262h28M597 262h28M884 262h33" fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M328 252l12 10-12 10M615 252l12 10-12 10M907 252l12 10-12 10" fill="none" stroke="#67e8f9" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="923" y="140" width="222" height="245" rx="22" fill="url(#focus)" stroke="#67e8f9" stroke-width="3" filter="url(#glow)"/>
    <circle cx="1034" cy="203" r="40" fill="#083344" stroke="#67e8f9" stroke-width="3"/>
    <circle cx="1020" cy="199" r="5" fill="#ffffff"/>
    <circle cx="1048" cy="199" r="5" fill="#ffffff"/>
    <path d="M1017 215q17 14 34 0" fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/>
    <text x="1034" y="278" fill="#ffffff" font-size="23" font-weight="700" text-anchor="middle">Focused context</text>
    <text x="1034" y="313" fill="#cffafe" font-size="16" text-anchor="middle">Relevant state now</text>
    <text x="1034" y="342" fill="#cffafe" font-size="16" text-anchor="middle">Fresh facts when needed</text>
  </g>

  <text x="600" y="448" fill="#c4b5fd" font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">Persistence preserves continuity. Retrieval and verification keep it useful.</text>
</svg>
