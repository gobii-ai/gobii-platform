<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Gobii logged-in website session flow</title>
  <desc id="desc">A four-step flow from defining a narrow job, through a scoped secret and authenticated browser session, to repeat work with a saved browser profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#100827"/>
      <stop offset="1" stop-color="#2a1054"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d1972"/>
      <stop offset="1" stop-color="#251144"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="24" fill="url(#bg)"/>
  <text x="600" y="54" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" text-anchor="middle">ONE JOB. SCOPED ACCESS. REUSABLE SESSION.</text>
  <g font-family="Arial, Helvetica, sans-serif">
    <g transform="translate(42 102)">
      <rect width="250" height="238" rx="20" fill="url(#card)" stroke="#7d52c7" stroke-width="2"/>
      <circle cx="125" cy="64" r="31" fill="#6f3bb5"/>
      <path d="M111 64h28M125 50v28" stroke="#43f1f4" stroke-width="5" stroke-linecap="round"/>
      <text x="125" y="127" fill="#43f1f4" font-size="17" font-weight="700" text-anchor="middle">1 · DEFINE</text>
      <text x="125" y="158" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Narrow job</text>
      <text x="125" y="188" fill="#d9c8f6" font-size="15" text-anchor="middle">Target site, outcome,</text>
      <text x="125" y="210" fill="#d9c8f6" font-size="15" text-anchor="middle">and approval boundary</text>
    </g>
    <path d="M304 221h42" stroke="#43f1f4" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
    <path d="m337 210 12 11-12 11" fill="none" stroke="#43f1f4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(350 102)">
      <rect width="250" height="238" rx="20" fill="url(#card)" stroke="#7d52c7" stroke-width="2"/>
      <rect x="100" y="48" width="50" height="42" rx="8" fill="#6f3bb5"/>
      <path d="M110 49v-8a15 15 0 0 1 30 0v8" fill="none" stroke="#43f1f4" stroke-width="5"/>
      <circle cx="125" cy="67" r="5" fill="#ffffff"/>
      <text x="125" y="127" fill="#43f1f4" font-size="17" font-weight="700" text-anchor="middle">2 · SCOPE</text>
      <text x="125" y="158" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Secure secret</text>
      <text x="125" y="188" fill="#d9c8f6" font-size="15" text-anchor="middle">Outside chat and tied</text>
      <text x="125" y="210" fill="#d9c8f6" font-size="15" text-anchor="middle">to the approved domain</text>
    </g>
    <path d="M612 221h42" stroke="#43f1f4" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
    <path d="m645 210 12 11-12 11" fill="none" stroke="#43f1f4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(658 102)">
      <rect width="250" height="238" rx="20" fill="url(#card)" stroke="#7d52c7" stroke-width="2"/>
      <rect x="88" y="39" width="74" height="56" rx="8" fill="none" stroke="#43f1f4" stroke-width="4"/>
      <path d="M88 53h74" stroke="#43f1f4" stroke-width="4"/>
      <circle cx="99" cy="46" r="3" fill="#ffffff"/><circle cx="109" cy="46" r="3" fill="#ffffff"/>
      <path d="m112 74 10 10 20-22" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="125" y="127" fill="#43f1f4" font-size="17" font-weight="700" text-anchor="middle">3 · WORK</text>
      <text x="125" y="158" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Authenticated site</text>
      <text x="125" y="188" fill="#d9c8f6" font-size="15" text-anchor="middle">Read, navigate, export,</text>
      <text x="125" y="210" fill="#d9c8f6" font-size="15" text-anchor="middle">or take approved action</text>
    </g>
    <path d="M920 221h42" stroke="#43f1f4" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
    <path d="m953 210 12 11-12 11" fill="none" stroke="#43f1f4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(966 102)">
      <rect width="192" height="238" rx="20" fill="url(#card)" stroke="#7d52c7" stroke-width="2"/>
      <path d="M68 65a30 30 0 1 1 8 20" fill="none" stroke="#43f1f4" stroke-width="5" stroke-linecap="round"/>
      <path d="m69 84 8 2 2-9" fill="none" stroke="#43f1f4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="96" y="127" fill="#43f1f4" font-size="17" font-weight="700" text-anchor="middle">4 · RESUME</text>
      <text x="96" y="158" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Saved profile</text>
      <text x="96" y="188" fill="#d9c8f6" font-size="15" text-anchor="middle">Reuse valid state;</text>
      <text x="96" y="210" fill="#d9c8f6" font-size="15" text-anchor="middle">reauthenticate if asked</text>
    </g>
  </g>
</svg>
