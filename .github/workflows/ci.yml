name: CI

on:
  pull_request:
  push:
    branches: [main]

# Auto-cancel previous runs on the same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Needed for posting test summaries/annotations
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  tag-guard:
    name: Tag Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Verify all tests are tagged and tags are in CI
        run: |
          python3 scripts/check_test_tags.py

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  sandbox-server-tests:
    name: Sandbox Server Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TEST_OUTPUT_DIR: test-results
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          ignore-nothing-to-cache: true

      - name: Create sandbox venv
        run: uv venv .venv-sandbox

      - name: Install sandbox test dependencies
        run: |
          uv pip install --python .venv-sandbox/bin/python -q -e ./sandbox_server unittest-xml-reporting

      - name: Run sandbox server tests
        run: |
          set -euo pipefail
          mkdir -p "$TEST_OUTPUT_DIR"
          .venv-sandbox/bin/python -m xmlrunner discover \
            -s sandbox_server/tests \
            -p 'test_*.py' \
            -o "$TEST_OUTPUT_DIR"

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-sandbox-server
          path: test-results/**
          if-no-files-found: warn
          retention-days: 7

  tests:
    name: tests (${{ matrix.batch }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - batch: email
            tag: batch_email
          - batch: sms
            tag: batch_sms
          - batch: email_body
            tag: batch_email_body
          - batch: email_small
            tag: smtp batch_outbound_email batch_email_allowlist batch_email_footer batch_outbound_dedupe
          - batch: pages
            tag: batch_pages
          - batch: pages_signals
            tag: batch_pages_signals
          - batch: public_templates
            tag: batch_public_templates
          - batch: marketing_events
            tag: batch_marketing_events
          - batch: contact_requests
            tag: batch_contact_requests
          - batch: console_agents
            tag: batch_console_agents
          - batch: console_agents_management
            tag: batch_console_agents_management
          - batch: api_console_small
            tag: batch_api_serializer batch_api_org_keys batch_console_allowlist batch_console_api_keys batch_mcp_admin mcp_org_assignment_batch
          - batch: secrets
            tag: batch_secrets
          - batch: secrets_profiles
            tag: batch_secrets_profiles
          - batch: global_secrets
            tag: global_secrets_batch
          - batch: global_skill_evals
            tag: batch_global_skill_evals
          - batch: proxy_selection
            tag: batch_proxy_selection
          - batch: step_compaction
            tag: batch_step_compaction
          - batch: subscription
            tag: batch_subscription
          - batch: task_credits
            tag: batch_task_credits
          - batch: output_schema
            tag: batch_output_schema
          - batch: link_shortener
            tag: batch_link_shortener
          - batch: organizations
            tag: batch_organizations
          - batch: browser_proxy_small
            tag: batch_browser_agent_max_tokens batch_browser_config batch_browser_profile batch_dedicated_proxy_models
          - batch: forward_detection
            tag: batch_forward_detection
          - batch: agent_limits
            tag: batch_agent_limits
          - batch: agent_credit_soft_target
            tag: agent_credit_soft_target_batch
          - batch: api_agents
            tag: batch_api_agents
          - batch: api_tasks
            tag: batch_api_tasks
          - batch: api_tasks_reads
            tag: batch_api_tasks_reads
          - batch: api_tasks_mutations
            tag: batch_api_tasks_mutations
          - batch: celery_redbeat
            tag: batch_celery_redbeat
          - batch: email_verification
            tag: batch_email_verification
          - batch: email_sender_db
            tag: batch_email_sender_db
          - batch: attachment_guidance
            tag: batch_attachment_guidance
          - batch: outbound_delivery
            tag: batch_outbound_delivery
          - batch: browser_task_db
            tag: batch_browser_task_db
          - batch: agent_invite
            tag: batch_agent_invite
          - batch: agent_collaborators
            tag: batch_agent_collaborators
          - batch: agent_filesystem
            tag: batch_agent_filesystem
          - batch: agent_secrets_ctx
            tag: batch_agent_secrets_ctx
          - batch: allowlist_rules
            tag: batch_allowlist_rules
          - batch: api_decodo
            tag: batch_api_decodo
          - batch: api_persistent_agents
            tag: batch_api_persistent_agents
          - batch: billing
            tag: batch_billing
          - batch: billing_small
            tag: batch_org_billing batch_plan_versioning batch_soft_expiration batch_stripe_config
          - batch: event_llm
            tag: batch_event_llm
          - batch: event_processing
            tag: batch_event_processing
          - batch: event_processing_credits
            tag: batch_event_processing_credits
          - batch: event_parallel
            tag: batch_event_parallel
          - batch: mcp_tools
            tag: batch_mcp_tools
          - batch: pipedream_connect
            tag: pipedream_connect
          - batch: promptree
            tag: batch_promptree
          - batch: xvfb
            tag: batch_xvfb
          - batch: agent_webhooks
            tag: batch_agent_webhooks
          - batch: agent_chat
            tag: batch_agent_chat
          - batch: human_input
            tag: batch_human_input
          - batch: peer_dm
            tag: batch_peer_dm
          - batch: allowlist_direction
            tag: batch_allowlist_direction
          - batch: console_context
            tag: batch_console_context
          - batch: token_usage
            tag: batch_token_usage
          - batch: batch_sqlite
            tag: batch_sqlite
          - batch: infra_small
            tag: batch_charter_tools batch_compaction batch_fbp_middleware batch_web_task_followup batch_periodic batch_redis_leaks batch_redis_budget_cleanup enable_database eval_sim oss_readiness_batch batch_setup_cookies batch_websocket
          - batch: tool_costs
            tag: batch_tool_costs
          - batch: tool_results
            tag: batch_tool_results
          - batch: context_hints
            tag: context_hints_batch
          - batch: result_analysis
            tag: batch_result_analysis
          - batch: content_skeleton
            tag: content_skeleton
          - batch: sqlite_analysis
            tag: sqlite_analysis
          - batch: http_request
            tag: http_request_batch
          - batch: billing_rollup
            tag: batch_billing_rollup
          - batch: agent_lifecycle
            tag: batch_agent_lifecycle
          - batch: agent_short_description
            tag: batch_agent_short_description
          - batch: video_generation
            tag: batch_video_generation
          - batch: agent_small
            tag: batch_agent_colors batch_agent_tags batch_agent_transfer batch_peer_intro batch_pa_shutdown_triggers batch_pa_step_credits batch_spawn_depth
          - batch: agent_tools
            tag: batch_agent_tools
          - batch: user_flags
            tag: batch_user_flags
          - batch: llm_tier_preferences
            tag: batch_llm_intelligence
          - batch: llm_routing_profiles
            tag: llm_routing_profiles_batch
          - batch: schedule
            tag: batch_schedule
          - batch: owner_billing
            tag: batch_owner_billing
          - batch: email_blocklist
            tag: batch_email_blocklist
          - batch: system_settings
            tag: batch_system_settings
          - batch: console_api
            tag: batch_console_api
          - batch: console_mcp_oauth
            tag: batch_console_mcp_oauth
          - batch: console_email_oauth
            tag: batch_console_email_oauth
          - batch: console_mcp_servers
            tag: batch_console_mcp_servers
          - batch: text_sanitization
            tag: batch_text_sanitization
          - batch: usage_api
            tag: batch_usage_api
          - batch: dedicated_proxy_service
            tag: batch_dedicated_proxy_service
          - batch: support_turnstile
            tag: batch_support_turnstile
          - batch: eval_fingerprint
            tag: batch_eval_fingerprint
          - batch: batch_pipedream_jit_connect
            tag: pipedream_jit_connect
          - batch: referral
            tag: referral_batch
    env:
      # Ensure Django loads test settings; manage.py still imports config.settings first
      DJANGO_SETTINGS_MODULE: config.test_settings
      PYTHONUNBUFFERED: "1"
      TEST_OUTPUT_DIR: test-results
      UV_PYTHON_DOWNLOADS: "never"  # use setup-python managed interpreter

      # Satisfy config.settings import before test settings override DB to SQLite
      DJANGO_SECRET_KEY: test-secret
      GOBII_ENCRYPTION_KEY: dummy-encryption-key-for-testing
      POSTGRES_DB: test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0

      # Satisfy LLM fail-fast check; any one provider key is enough
      OPENAI_API_KEY: dummy
      # Disable Celery worker self-shutdown logic in tests to avoid interfering with CI runner
      BROWSER_USE_TASK_MAX_COUNT: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          ignore-nothing-to-cache: true

      - name: Restore venv cache
        id: restore-venv
        uses: actions/cache/restore@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-py3.12-

      # Install dependencies into a project venv using uv, leveraging cache.
      # Prefer lockfile if present; otherwise resolve from pyproject.
      - name: Sync deps (locked)
        if: ${{ hashFiles('uv.lock') != '' }}
        run: |
          uv sync --frozen --all-extras --dev

      - name: Sync deps
        if: ${{ hashFiles('uv.lock') == '' }}
        run: |
          uv sync --all-extras --dev

      - name: Add JUnit test runner to venv
        run: |
          uv pip install -q unittest-xml-reporting

      - name: Save venv cache
        if: steps.restore-venv.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py3.12-${{ hashFiles('uv.lock') }}

      - name: Run batch tests (${{ matrix.batch }})
        run: |
          set -euo pipefail
          BATCH_OUTPUT_DIR="$TEST_OUTPUT_DIR/${{ matrix.batch }}"
          mkdir -p "$BATCH_OUTPUT_DIR"
          TAGS="${{ matrix.tag }}"
          TAG_ARGS=()
          for TAG in $TAGS; do
            TAG_ARGS+=(--tag "$TAG")
          done
          echo "Running tests with tags: $TAGS"
          uv run python manage.py test "${TAG_ARGS[@]}" \
            --settings=config.test_settings \
            --parallel 1 \
            --testrunner=xmlrunner.extra.djangotestrunner.XMLTestRunner
          # xmlrunner uses suite name + second-level timestamp for filenames, so
          # batch-specific subdirs avoid collisions when multiple matrix jobs
          # emit the same TEST-*.xml basename.
          shopt -s nullglob || true
          for f in TEST-*.xml; do mv "$f" "$BATCH_OUTPUT_DIR/"; done || true

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.batch }}
          path: test-results/**
          if-no-files-found: warn
          retention-days: 7

      # No per-batch PR checks to reduce noise; artifacts are uploaded above.

  report:
    name: Combined Test Results
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs: [tests, sandbox-server-tests]
    steps:
      - name: Download all test result artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: test-results-*
          merge-multiple: true
          path: all-results

      - name: Publish combined test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: all-results/**/*.xml
          check_name: "Combined Test Results"
          comment_mode: off

  publish-static-assets:
    name: Publish Static Assets
    runs-on: ubuntu-latest
    # Test jobs report independently; staging deploy only needs deploy inputs.
    needs: [tag-guard]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      STATIC_BUCKET: gobii-platform-static
      STATIC_ASSET_BASE_URL: https://static.gobii.ai/frontend/releases
      VITE_BUILD_BASE_URL: https://static.gobii.ai/frontend/releases/${{ github.sha }}/
      AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install AWS CLI
        run: |
          python3 -m pip install --user awscli

      - name: Build frontend assets
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          npm ci --prefix frontend
          npm run build --prefix frontend
          test -f static/frontend/manifest.json
          python3 scripts/vite_release_manifest.py \
            --manifest static/frontend/manifest.json \
            --root static/frontend \
            --check-local > vite_release_paths.txt

      - name: Upload immutable release assets
        env:
          RELEASE_PREFIX: s3://${{ env.STATIC_BUCKET }}/frontend/releases/${{ github.sha }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          aws s3 sync static/frontend/assets "${RELEASE_PREFIX}/assets" \
            --endpoint-url "${R2_ENDPOINT}" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 cp static/frontend/manifest.json "${RELEASE_PREFIX}/manifest.json" \
            --endpoint-url "${R2_ENDPOINT}" \
            --cache-control "no-cache, max-age=0, must-revalidate" \
            --content-type "application/json"

      - name: Verify uploaded release assets
        env:
          RELEASE_PREFIX: frontend/releases/${{ github.sha }}
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          aws s3api head-object \
            --bucket "${STATIC_BUCKET}" \
            --key "${RELEASE_PREFIX}/manifest.json" \
            --endpoint-url "${R2_ENDPOINT}" >/dev/null
          while IFS= read -r relative_path; do
            aws s3api head-object \
              --bucket "${STATIC_BUCKET}" \
              --key "${RELEASE_PREFIX}/${relative_path}" \
              --endpoint-url "${R2_ENDPOINT}" >/dev/null
          done < vite_release_paths.txt

      - name: Verify public asset URL
        run: |
          set -euo pipefail
          curl -fsSI "${STATIC_ASSET_BASE_URL}/${GITHUB_SHA}/manifest.json" >/dev/null

  trigger-preview:
    name: Dispatch Preview Deployment
    runs-on: ubuntu-latest
    # Failed tests should not prevent preview environments from updating.
    needs: [tag-guard]
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: gobii-ai
          repositories: gobii

      - name: Notify infra repo
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: gobii-ai/gobii
          event-type: preview-ready
          client-payload: |
            {
              "owner": "${{ github.repository_owner }}",
              "repo": "${{ github.event.repository.name }}",
              "pr_number": ${{ github.event.pull_request.number }},
              "head_sha": "${{ github.event.pull_request.head.sha }}",
              "head_ref": "${{ github.event.pull_request.head.ref }}",
              "html_url": "${{ github.event.pull_request.html_url }}",
              "trigger_run_id": ${{ github.run_id }},
              "trigger_run_attempt": ${{ github.run_attempt }},
              "actor": "${{ github.actor }}"
            }

  trigger-staging:
    name: Dispatch Staging Deployment
    runs-on: ubuntu-latest
    # Failed tests should not prevent staging from deploying a published asset set.
    needs: [tag-guard, publish-static-assets]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: gobii-ai
          repositories: gobii

      - name: Notify infra repo
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: gobii-ai/gobii
          event-type: staging-ready
          client-payload: |
            {
              "owner": "${{ github.repository_owner }}",
              "repo": "${{ github.event.repository.name }}",
              "ref": "${{ github.ref }}",
              "head_sha": "${{ github.sha }}",
              "trigger_run_id": ${{ github.run_id }},
              "trigger_run_attempt": ${{ github.run_attempt }},
              "pusher": "${{ github.actor }}",
              "compare_url": "${{ github.event.compare || '' }}"
            }
