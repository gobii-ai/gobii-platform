name: Preview Cleanup Dispatch

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  dispatch:
    name: Dispatch Preview Cleanup
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: gobii-ai
          repositories: gobii

      - name: Notify infra repo for cleanup
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: gobii-ai/gobii
          event-type: preview-cleanup
          client-payload: |
            {
              "owner": "${{ github.repository_owner }}",
              "repo": "${{ github.event.repository.name }}",
              "pr_number": ${{ github.event.pull_request.number }},
              "merged": ${{ github.event.pull_request.merged }},
              "trigger_run_id": ${{ github.run_id }},
              "trigger_run_attempt": ${{ github.run_attempt }}
            }
