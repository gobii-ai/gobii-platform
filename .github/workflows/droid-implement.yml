name: Droid Implement

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

jobs:
  implement:
    if: |
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@droid') || contains(github.event.issue.title, '@droid'))) ||
      (github.event_name == 'issue_comment' && !github.event.issue.pull_request && contains(github.event.comment.body, '@droid'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Acknowledge on issue
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: '🤖 Droid is picking this up. I\'ll open a PR when the implementation is ready.\n\n[View workflow run](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')'
            });

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup droid CLI
        run: |
          curl -fsSL https://app.factory.ai/cli | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Extract prompt
        id: prompt
        uses: actions/github-script@v8
        with:
          script: |
            let prompt = '';
            if (context.eventName === 'issue_comment') {
              prompt = context.payload.comment.body;
            } else {
              prompt = context.payload.issue.body || '';
            }
            // Strip the @droid mention
            prompt = prompt.replace(/@droid\s*/gi, '').trim();
            core.setOutput('text', prompt);

      - name: Implement with Droid
        env:
          FACTORY_API_KEY: ${{ secrets.DROID_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          DROID_PROMPT: ${{ steps.prompt.outputs.text }}
        run: |
          BRANCH="droid/issue-${ISSUE_NUMBER}"
          git checkout -b "$BRANCH"

          droid exec --auto high -m claude-opus-4-6 "
            You are working in a GitHub Actions CI environment.
            Implement the following request from issue #${ISSUE_NUMBER} (${ISSUE_TITLE}):

            ${DROID_PROMPT}

            After implementing:
            1. Commit your changes with a descriptive message referencing issue #${ISSUE_NUMBER}
            2. Push the branch to origin
            3. Create a pull request linking back to issue #${ISSUE_NUMBER} using 'Closes #${ISSUE_NUMBER}' in the PR body
          "
