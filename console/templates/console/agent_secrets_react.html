{% extends "console_page.html" %}
{% load vite_tags %}

{% block console_content %}
<div class="space-y-4">
  {% with placeholder_id='00000000-0000-0000-0000-000000000000' %}
  <div id="gobii-frontend-root"
       class="min-h-[50vh]"
       data-app="agent-secrets"
       data-agent-id="{{ agent.id }}"
       data-agent-name="{{ agent.name|escape }}"
       data-list-url="{% url 'console-agent-secret-list' agent.id %}"
       data-detail-url-template="{% url 'console-agent-secret-detail' agent.id placeholder_id %}"
       data-promote-url-template="{% url 'console-agent-secret-promote' agent.id placeholder_id %}"
       data-agent-detail-url="{% url 'agent_detail' agent.id %}"
       data-global-secrets-url="{% url 'console-secrets' %}"
       data-request-url="{% url 'agent_secrets_request' agent.id %}">
  </div>
  {% endwith %}
</div>
{% endblock %}

{% block extra_js %}
  {{ block.super }}
  {% vite_asset 'src/main.tsx' %}
{% endblock %}
